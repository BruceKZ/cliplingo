name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  metadata:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate app version
        id: version
        shell: bash
        run: |
          APP_VERSION=$(node -p "require('./apps/desktop/package.json').version")
          TAURI_VERSION=$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")

          if [ "$APP_VERSION" != "$TAURI_VERSION" ]; then
            echo "apps/desktop/package.json version ($APP_VERSION) does not match apps/desktop/src-tauri/tauri.conf.json version ($TAURI_VERSION)." >&2
            exit 1
          fi

          TAG_NAME="v$APP_VERSION"

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_NAME}" != "$TAG_NAME" ]; then
            echo "Git tag ${GITHUB_REF_NAME} does not match app version tag ${TAG_NAME}." >&2
            exit 1
          fi

          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify Desktop App
    needs: metadata
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release verification
        run: ./scripts/verify-release.sh

  publish:
    name: Publish ${{ matrix.name }} Release Assets
    needs:
      - metadata
      - verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            platform: macos-latest
            args: --bundles app,dmg
          - name: Windows
            platform: windows-latest
            args: --bundles msi,nsis
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ needs.metadata.outputs.tag_name }}
          releaseName: ClipLingo v${{ needs.metadata.outputs.version }}
          releaseBody: See the assets to download this version and install it on macOS or Windows.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
